name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19
      - name: Generate build-only ESP-NOW keys
        run: |
          echo "FLIP7_ESPNOW_PMK=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          echo "FLIP7_ESPNOW_LMK=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - name: Build firmware
        run: pio run
      - name: Test game logic
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror -Iinclude test/puzzle_logic_test.cpp -o /tmp/puzzle_logic_test
          /tmp/puzzle_logic_test
          g++ -std=c++17 -Wall -Wextra -Werror -Iinclude test/mastermind_logic_test.cpp -o /tmp/mastermind_logic_test
          /tmp/mastermind_logic_test
